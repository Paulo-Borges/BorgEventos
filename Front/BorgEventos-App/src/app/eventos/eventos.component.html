<h2>Eventos</h2>

<hr>

<form action="" class="form-inline">
  <div class="form-group mb-2">
    <input type="text" class="form-control mr-2" placeholder="buscar" />
    <button class="btn btn-outline-sucess">Buscar</button>
  </div>
</form>

<table class="table table-striped">
  <thead class="thead-dark">
    <tr>
      <th>#</th>
      <th>
        <button type="button" class="btn btn-outline-light btn-sm" (click)="alterarImagem()">
          {{ !mostrarImg ? "exibir" : "ocultar" }}
        </button>
      </th>
      <th>Tema</th>
      <th>Local</th>
      <th>Data</th>
      <th>QTD Pessoas</th>
      <th>Lote</th>
      <th>Opções</th>
    </tr>
  </thead>
  <tbody *ngIf= "eventos && eventos.length">
    <tr *ngFor="let evento of eventos" >
      <td>{{ evento.eventoId }}</td>
      <td>
         <img [collapse]="mostrarImg" 
         [isAnimated]="true"
         src="/assets/{{evento.imagemURL}}" 
         [style.width.px]= "widthImg"
         [style.margin.px]= "marginImg"
         > 
        </td>
      <td>{{ evento.tema }}</td>
      <td>{{ evento.local }}</td>
      <td>{{ evento.dataEvento }}</td>
      <td>{{ evento.qtdPessoas }}</td>
      <td>{{ evento.lote }}</td>
      <td>{{ evento.local }}</td>
    </tr>
  </tbody>
  <tfoot *ngIf= "!eventos.length">
    <tr>
      <td colspan="8" class="text-center">Nenhum evento encontrado!</td>
    </tr>
  </tfoot>
</table>

<!-- {{ eventos | json }} busca o json do Banco de Dados -->
